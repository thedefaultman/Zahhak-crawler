name: Build & Release Companion App

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v2.0.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: companion
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o ../dist/zahhak-companion-windows-amd64.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zahhak-companion-windows-amd64.exe
          path: dist/zahhak-companion-windows-amd64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zahhak-companion-windows-amd64.exe
          body: |
            ## Zahhak Companion App

            Download and run the companion binary to enable Local mode in the Zahhak extension.

            | Platform | File |
            |----------|------|
            | Windows (x64) | `zahhak-companion-windows-amd64.exe` |

            ### First run

            Just run the binary — it automatically:
            - Detects your hardware (CPU, RAM, GPU/VRAM)
            - Installs Ollama and pulls the best Qwen 3.5 model for your system
            - Downloads the Vosk speech-to-text model (~40MB) and installs the Python package
            - Downloads PinchTab for browser automation (~12MB)
            - Connects to Chrome via DevTools Protocol

            ### Requirements
            - Windows 10/11 (x64)
            - Chrome browser installed
            - Python 3.x installed and in PATH ([python.org](https://python.org))
