name: Build & Release Companion App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build companion binary
        working-directory: companion
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o ../dist/zahhak-companion-windows-amd64.exe .

      - name: Package extension zip
        run: cd extension && zip -r ../dist/zahhak-extension.zip .

      - name: Upload companion binary
        uses: actions/upload-artifact@v4
        with:
          name: zahhak-companion-windows-amd64.exe
          path: dist/zahhak-companion-windows-amd64.exe

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: zahhak-extension.zip
          path: dist/zahhak-extension.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zahhak-companion-windows-amd64.exe
            dist/zahhak-extension.zip
          body: |
            ## Zahhak Companion App

            Download **`zahhak-companion-windows-amd64.exe`** and run it. That's it.

            The companion automatically:
            - Downloads and installs the Zahhak Chrome extension
            - Launches Chrome with the extension auto-loaded (your profile, tabs, and logins are preserved)
            - Detects your hardware (CPU, RAM, GPU/VRAM)
            - Installs Ollama and pulls the best model for your system
            - Downloads PinchTab for browser automation
            - Connects to Chrome via DevTools Protocol

            ### Requirements
            - Windows 10/11 (x64)
            - Chrome browser installed
